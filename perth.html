const TM={
conference:{c:"#534AB7",l:"IRSPM"},
food:{c:"#D85A30",l:"Aussie Food"},
sight:{c:"#1D9E75",l:"Sight"},
transport:{c:"#5F5E5A",l:"Transit"},
hotel:{c:"#378ADD",l:"Hotel"}
};
let map,markers=[],poly=null,cur=0;
function init(){
map=L.map('map',{zoomControl:false}).setView([-31.95,115.86],11);
L.control.zoom({position:'topright'}).addTo(map);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'OSM',maxZoom:18}).addTo(map);
const lg=document.getElementById('lgd');
Object.entries(TM).forEach(([k,v])=>{lg.innerHTML+=`<span><i style="background:${v.c}"></i>${v.l}</span>`;});
const tabs=document.getElementById('tabs');
D.forEach((d,i)=>{
const b=document.createElement('button');
b.className='tab'+(i===0?' active':'');
b.innerHTML=`<span class="dn">${d.label}</span><br><span class="dl">${d.title.substring(0,22)}</span>`;
b.onclick=()=>go(i);
tabs.appendChild(b);
});
go(0);
}
function go(idx){
cur=idx;
document.querySelectorAll('.tab').forEach((b,i)=>{b.className=i===idx?'tab active':'tab'});
const d=D[idx],s=document.getElementById('sc');
s.innerHTML='';
const h=document.createElement('div');
h.className='dh';
h.innerHTML=`<h2>Day ${idx+1} · ${d.title}</h2><div class="rt">${d.route}</div><div class="pace">${d.pace}</div><p>${d.sum}</p>`;
s.appendChild(h);
markers.forEach(m=>map.removeLayer(m));markers=[];
if(poly){map.removeLayer(poly);poly=null}
const bounds=[];
d.items.forEach((it,i)=>{
const m=TM[it.type],n=i+1;
const ic=L.divIcon({className:'',html:`<div style="width:24px;height:24px;border-radius:50%;background:${m.c};color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.25)">${n}</div>`,iconSize:[24,24],iconAnchor:[12,12]});
const mk=L.marker([it.lat,it.lng],{icon:ic}).addTo(map);
mk.bindPopup(`<div style="font-size:11px;line-height:1.5;min-width:150px"><b>${it.name}</b><br><span style="color:#888">${it.time}</span>${it.price?'<br><b style="color:#0F6E56">'+it.price+'</b>':''}${it.transit?'<br><span style="color:#854F0B;font-size:10px">🚆 '+it.transit+'</span>':''}<br>${it.note}</div>`);
markers.push(mk);bounds.push([it.lat,it.lng]);
const c=document.createElement('div');
c.className='cd';c.onclick=()=>{document.querySelectorAll('.cd').forEach(x=>x.classList.remove('on'));c.classList.add('on');map.setView([it.lat,it.lng],14,{animate:true});mk.openPopup();};
let badges='';
if(it.price)badges+=`<span class="pr">${it.price}</span>`;
if(it.transit)badges+=`<span class="tr">🚆 ${it.transit}</span>`;
c.innerHTML=`<div class="nc" style="background:${m.c}">${n}</div><div class="cb"><div class="nm"><span class="tg" style="background:${m.c}18;color:${m.c}">${m.l}</span>${it.name}</div><div class="tm">${it.time}</div><div class="nt">${it.note}</div>${badges}</div>`;
s.appendChild(c);
});
if(bounds.length>1){poly=L.polyline(d.items.map(x=>[x.lat,x.lng]),{color:'#0F6E56',weight:2,opacity:.4,dashArray:'6 8'}).addTo(map);markers.push(poly);map.fitBounds(bounds,{padding:[30,30]});}
// Budget
let bb=document.createElement('div');bb.className='box bud';
bb.innerHTML=`<h3>Today's Budget (per person)</h3>
<div class="row"><span>Meals</span><span>${d.budget.food}</span></div>
<div class="row"><span>Transport</span><span>${d.budget.transport}</span></div>
<div class="row"><span>Tickets/Activities</span><span>${d.budget.act}</span></div>
<div style="border-top:1px solid #EF9F27;margin-top:3px;padding-top:3px;display:flex;justify-content:space-between;align-items:center"><span style="font-size:11px;font-weight:700;color:#854F0B">Daily Total</span><span class="tot">${d.budget.total}</span></div>`;
s.appendChild(bb);
// Tips
if(d.tips&&d.tips.length){let tp=document.createElement('div');tp.className='box tip';tp.innerHTML=`<h3>Tonight's To-Do（今晚准备）</h3><ul>${d.tips.map(t=>`<li>${t}</li>`).join('')}</ul>`;s.appendChild(tp);}
// Day 1 overview
if(idx===0){
s.innerHTML+=`<div class="box info"><b>7-Day Overview · ~A$450/person</b><br>
Day1 $33 · Day2 $55 · Day3 $22 · Day4 $54 · Day5 $128 · Day6 $120 · Day7 $35<br><br>
<b>Transport:</b> 火车4条线(Joondalup/Fremantle/Midland/Airport) + Bus + Day6用Uber去John Forrest和Caversham · 周日全天免费<br><br>
<b>14 Aussie Foods（零重复）:</b><br>
① Chicken Parma + LLB · ② Smashed Avo + Flat White · ③ Modern Australian Bush Tucker · ④ Aussie BBQ · ⑤ Sausage Roll + Iced Chocolate · ⑥ Eggs Benedict + Long Black · ⑦ Barramundi Fish & Chips · ⑧ Gala Dinner (WA Lobster) · ⑨ Meat Pie + Lamington · ⑩ Garlic Prawns + Seafood Chowder · ⑪ 奶酪拼盘 + Sparkling · ⑫ Kangaroo Burger + Halloumi Fries · ⑬ Chiko Roll + Pavlova · ⑭ Snapper Curry Pie + Tim Tam Slam<br><br>
<b>8 types of landscape:</b><br>
🏖 3 beaches (Cottesloe·Scarborough·Mullaloo) · 🏝 1 island (Rottnest) · 🌲 1 native forest (John Forrest NP) · 🌿 1 urban bushland (Bold Park) · 🏙 2 city walks (Northbridge·CBD Heritage) · ⛵ 1 harbour (Hillarys) · 🐨 1 wildlife park (Caversham) · 🍷 1 wine region (Swan Valley) · 🎪 2 markets (Fremantle·Scarborough)</div>`;
}
// Last day checklist
if(idx===6){
let fb=document.createElement('div');fb.className='box fd';
fb.innerHTML=`<h3>Australian Food Checklist — 14 Dishes, Zero Repeats!</h3><ul>
<li>Day1 · Chicken Parma + Lemon Lime & Bitters（pub国民晚餐）</li>
<li>Day2 · Smashed Avo + Flat White（brunch灵魂，澳洲发明的！）</li>
<li>Day2 · Modern Australian / Bush Tucker（原住民食材创意菜）</li>
<li>Day3 · Aussie BBQ — Snags & Steak（海边烧烤仪式）</li>
<li>Day3 · Sausage Roll + Iced Chocolate（酥皮香肠卷+冰巧克力）</li>
<li>Day4 · Eggs Benedict + Long Black（海边早午餐）</li>
<li>Day4 · Barramundi Fish & Chips（百年老店澳洲国鱼）</li>
<li>Day4 · Gala Dinner — WA Rock Lobster（西澳龙虾正式晚宴）</li>
<li>Day5 · Meat Pie + Lamington（国民肉饼+国宝甜点）</li>
<li>Day5 · Garlic Prawns + Seafood Chowder（西澳港口海鲜）</li>
<li>Day6 · 奶酪拼盘 + Sparkling Grape Juice（天鹅谷田园午餐）</li>
<li>Day6 · Kangaroo Burger + Halloumi Fries（袋鼠肉+炸芝士条）</li>
<li>Day7 · Chiko Roll + Pavlova（澳洲炸春卷+蛋白霜蛋糕）</li>
<li>Day7 · Snapper Curry Pie + Tim Tam Slam（鲷鱼饼+Tim Tam吸咖啡仪式）</li></ul>`;
s.appendChild(fb);
}
}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'&&cur<D.length-1)go(cur+1);if(e.key==='ArrowLeft'&&cur>0)go(cur-1);});
init();
</script>
