<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LG2026005C0004 综合管理岗直接业务考核备考指南</title>
  <style>
    :root {
      --bg: #f7f9fc;
      --panel: #ffffff;
      --ink: #172033;
      --muted: #657386;
      --line: #dfe6ef;
      --blue: #1d4ed8;
      --teal: #0f766e;
      --green: #15803d;
      --amber: #b45309;
      --red: #b91c1c;
      --soft-blue: #eff6ff;
      --soft-teal: #ecfdf5;
      --soft-amber: #fffbeb;
      --soft-red: #fef2f2;
      --radius: 8px;
      --shadow: 0 10px 26px rgba(23, 32, 51, .08);
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      color: var(--ink);
      font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      line-height: 1.68;
      background: var(--bg);
    }

    a { color: inherit; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, .94);
      backdrop-filter: blur(12px);
    }

    .topbar-inner {
      max-width: 1120px;
      margin: 0 auto;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .brand {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .brand *,
    .brand:hover * {
      text-decoration: none;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-weight: 800;
      background: var(--blue);
    }

    .brand h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .brand p {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .nav a,
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      padding: 8px 13px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: #334155;
      font: inherit;
      font-size: 14px;
      line-height: 1.2;
      text-decoration: none;
      background: #fff;
      cursor: pointer;
    }

    .nav a:hover,
    .btn:hover {
      border-color: var(--blue);
      color: var(--blue);
    }

    .btn.primary {
      border-color: var(--blue);
      color: #fff;
      background: var(--blue);
    }

    .btn.primary:hover {
      color: #fff;
      background: #1e40af;
    }

    .btn.ghost {
      background: transparent;
    }

    .page {
      max-width: 1120px;
      margin: 0 auto;
      padding: 26px 20px 64px;
    }

    .view {
      display: grid;
      gap: 18px;
    }

    .hero,
    .panel,
    .question-panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 28px;
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--teal);
      font-size: 14px;
      font-weight: 800;
    }

    .hero h2,
    .panel h2,
    .question-title {
      margin: 0;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .hero h2 {
      max-width: 760px;
      font-size: clamp(28px, 5vw, 44px);
    }

    .lead {
      max-width: 840px;
      margin: 14px 0 0;
      color: #334155;
      font-size: 17px;
    }

    .meta-grid,
    .card-grid,
    .summary-grid {
      display: grid;
      gap: 12px;
    }

    .meta-grid {
      grid-template-columns: repeat(4, minmax(0, 1fr));
      margin-top: 22px;
    }

    .card-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .summary-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .meta,
    .card,
    .note,
    .mini-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
    }

    .meta {
      padding: 12px;
    }

    .meta b {
      display: block;
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .meta span {
      display: block;
      font-weight: 800;
      line-height: 1.38;
    }

    .panel {
      padding: 22px;
    }

    .panel-head {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    .panel-head p {
      margin: 6px 0 0;
      color: var(--muted);
    }

    .panel h2 {
      font-size: 23px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 26px;
      padding: 3px 9px;
      border-radius: 999px;
      color: var(--teal);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
      background: var(--soft-teal);
      border: 1px solid rgba(15, 118, 110, .2);
    }

    .status.pending {
      color: var(--muted);
      background: #f8fafc;
      border-color: var(--line);
    }

    .status.warn {
      color: var(--amber);
      background: var(--soft-amber);
      border-color: rgba(180, 83, 9, .22);
    }

    .card {
      padding: 16px;
      display: grid;
      gap: 12px;
      align-content: start;
    }

    .card h3 {
      margin: 0;
      font-size: 18px;
      line-height: 1.35;
    }

    .card p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      margin-top: 4px;
    }

    .question-list {
      display: grid;
      gap: 10px;
    }

    .question-link {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: inherit;
      text-decoration: none;
      background: #fff;
    }

    .question-link:hover {
      border-color: var(--blue);
      background: var(--soft-blue);
    }

    .q-index {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      color: #fff;
      font-weight: 800;
      background: var(--ink);
    }

    .question-link strong {
      display: block;
      line-height: 1.42;
    }

    .question-link span {
      color: var(--muted);
      font-size: 13px;
    }

    .question-panel {
      overflow: hidden;
    }

    .question-shell {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 290px;
      gap: 0;
    }

    .question-main {
      padding: 28px;
      border-right: 1px solid var(--line);
    }

    .question-aside {
      padding: 24px;
      background: #fbfdff;
    }

    .crumbs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 18px;
      color: var(--muted);
      font-size: 13px;
    }

    .crumbs a {
      color: var(--blue);
      text-decoration: none;
    }

    .question-type {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0 0 12px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 2px 8px;
      border-radius: 999px;
      color: var(--blue);
      font-size: 12px;
      font-weight: 800;
      background: var(--soft-blue);
      border: 1px solid rgba(29, 78, 216, .18);
    }

    .chip.teal {
      color: var(--teal);
      background: var(--soft-teal);
      border-color: rgba(15, 118, 110, .18);
    }

    .chip.amber {
      color: var(--amber);
      background: var(--soft-amber);
      border-color: rgba(180, 83, 9, .2);
    }

    .question-title {
      font-size: clamp(24px, 4vw, 34px);
    }

    .prompt {
      margin: 14px 0 0;
      color: #334155;
      font-size: 16px;
    }

    .answer-block {
      margin-top: 24px;
      padding-top: 22px;
      border-top: 1px solid var(--line);
    }

    .answer-block h3,
    .question-aside h3 {
      margin: 0 0 10px;
      font-size: 18px;
      line-height: 1.35;
    }

    .answer-block p {
      margin: 0 0 10px;
      color: #263244;
    }

    .answer-block p:last-child { margin-bottom: 0; }

    .answer-block ol,
    .answer-block ul,
    .question-aside ul,
    .question-aside ol,
    .note ul,
    .note ol {
      margin: 0;
      padding-left: 20px;
    }

    .answer-block li,
    .question-aside li,
    .note li {
      margin: 5px 0;
    }

    .note {
      margin-top: 14px;
      padding: 14px;
    }

    .note.blue { background: var(--soft-blue); border-color: rgba(29, 78, 216, .2); }
    .note.teal { background: var(--soft-teal); border-color: rgba(15, 118, 110, .2); }
    .note.amber { background: var(--soft-amber); border-color: rgba(180, 83, 9, .2); }
    .note.red { background: var(--soft-red); border-color: rgba(185, 28, 28, .2); }

    .note h4 {
      margin: 0 0 8px;
      font-size: 15px;
    }

    .note p {
      margin: 0;
      color: #334155;
      font-size: 14px;
    }

    .hl {
      padding: 1px 4px;
      border-radius: 5px;
      font-weight: 800;
      box-decoration-break: clone;
      -webkit-box-decoration-break: clone;
    }

    .hl.logic {
      color: var(--blue);
      background: rgba(29, 78, 216, .09);
    }

    .hl.key {
      color: var(--teal);
      background: rgba(15, 118, 110, .09);
    }

    .hl.policy {
      color: var(--amber);
      background: rgba(180, 83, 9, .11);
    }

    .hl.risk {
      color: var(--red);
      background: rgba(185, 28, 28, .09);
    }

    .ref-list {
      display: grid;
      gap: 10px;
    }

    .ref-item {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fbfdff;
    }

    .ref-kind {
      display: inline-flex;
      margin-bottom: 6px;
      padding: 2px 7px;
      border-radius: 999px;
      color: var(--teal);
      font-size: 12px;
      font-weight: 800;
      background: var(--soft-teal);
    }

    .ref-item a,
    .ref-title {
      color: var(--blue);
      font-weight: 800;
      text-decoration: none;
    }

    .ref-item a:hover {
      text-decoration: underline;
    }

    .ref-item p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .side-box {
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--line);
    }

    .side-box:last-child {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: 0;
    }

    .progress {
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: #e5eaf1;
    }

    .progress div {
      height: 100%;
      background: var(--blue);
    }

    .summary-list {
      display: grid;
      gap: 10px;
    }

    .mini-card {
      padding: 14px;
    }

    .mini-card h3 {
      margin: 0 0 8px;
      font-size: 17px;
    }

    .mini-card p {
      margin: 0;
      color: #3b4658;
      font-size: 14px;
    }

    .day-roadmap {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 9px;
    }

    .roadmap-item {
      min-height: 94px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
    }

    .roadmap-item b {
      display: block;
      margin-bottom: 4px;
      color: var(--teal);
      font-size: 13px;
    }

    .roadmap-item span {
      display: block;
      color: #334155;
      font-size: 13px;
      line-height: 1.45;
    }

    .roadmap-item.current {
      border-color: rgba(29, 78, 216, .4);
      background: var(--soft-blue);
    }

    .source-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .source-list li {
      color: var(--muted);
      font-size: 13px;
    }

    .source-list a {
      color: var(--blue);
      text-decoration: none;
    }

    .source-list a:hover { text-decoration: underline; }

    .empty {
      padding: 26px;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 900px) {
      .topbar-inner {
        align-items: flex-start;
        flex-direction: column;
      }

      .nav { justify-content: flex-start; }
      .meta-grid,
      .card-grid,
      .summary-grid,
      .question-shell {
        grid-template-columns: 1fr;
      }

      .question-main {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .day-roadmap {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 560px) {
      .topbar-inner,
      .page {
        padding-left: 14px;
        padding-right: 14px;
      }

      .hero,
      .panel,
      .question-main,
      .question-aside {
        padding: 18px;
      }

      .question-link {
        grid-template-columns: auto 1fr;
      }

      .question-link .status {
        grid-column: 1 / -1;
        width: fit-content;
      }

      .day-roadmap {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>

      days: [

        ]

    const flatHighlightTerms = highlightTerms
      .flatMap(group => group.terms.map(term => ({ term, className: group.className })))
      .sort((a, b) => b.term.length - a.term.length);

    function rich(value) {
      const text = esc(value);
      const ranges = [];
      for (const { term, className } of flatHighlightTerms) {
        let start = 0;
        while (start < text.length) {
          const index = text.indexOf(term, start);
          if (index === -1) break;
          const end = index + term.length;
          const overlaps = ranges.some(range => index < range.end && end > range.start);
          if (!overlaps) ranges.push({ start: index, end, className });
          start = end;
        }
      }
      ranges.sort((a, b) => a.start - b.start);
      let output = "";
      let cursor = 0;
      for (const range of ranges) {
        output += text.slice(cursor, range.start);
        output += `<span class="hl ${range.className}">${text.slice(range.start, range.end)}</span>`;
        cursor = range.end;
      }
      output += text.slice(cursor);
      return output;
    }

    function list(items, ordered = false) {
      const tag = ordered ? "ol" : "ul";
      return `<${tag}>${items.map(item => `<li>${rich(item)}</li>`).join("")}</${tag}>`;
    }

    function paragraphs(items) {
      return items.map(item => `<p>${rich(item)}</p>`).join("");
    }

    function referenceList(items) {
      if (!items || !items.length) {
        return `<p>本题未单独引用外部文件，主要依据岗位职责和通用面试答题方法。</p>`;
      }
      return `<div class="ref-list">${items.map(ref => {
        const title = ref.url
          ? `<a href="${esc(ref.url)}" target="_blank" rel="noopener">${esc(ref.title)}</a>`
          : `<span class="ref-title">${esc(ref.title)}</span>`;
        return `
          <div class="ref-item">
            <span class="ref-kind">${esc(ref.kind)}</span>
            <div>${title}</div>
            <p>${esc(ref.note)}</p>
          </div>
        `;
      }).join("")}</div>`;
    }

    function chips(items) {
      return items.map((item, index) => `<span class="chip ${index % 2 ? "teal" : ""}">${esc(item)}</span>`).join("");
    }

      `;
    }

    function render() {
      const route = location.hash.replace(/^#/, "") || "home";
      const questionMatch = route.match(/^day-(\d+)-q-(\d+)$/);
      const summaryMatch = route.match(/^day-(\d+)-summary$/);
      const dayMatch = route.match(/^day-(\d+)$/);

      if (route === "home") renderHome();
      else if (route === "overall") renderOverall();
      else if (questionMatch) renderQuestion(questionMatch[1], questionMatch[2]);
      else if (summaryMatch) renderDaySummary(summaryMatch[1]);
      else if (dayMatch) renderDay(dayMatch[1]);
      else renderNotFound();

      window.scrollTo({ top: 0, behavior: "auto" });
    }

    window.addEventListener("hashchange", render);
    render();
